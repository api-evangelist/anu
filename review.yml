reviews:
  - date: '2026-06-03'
    rating: 2
    summary: >-
      ANU has no central institutional developer portal. The two confirmed public
      APIs are QRNG@ANU (live quantum random numbers, legacy endpoint returned
      HTTP 200 and works without auth; newer quantumnumbers.anu.edu.au offers the
      same with a free API key) and the Open Research OAI-PMH endpoint (DSpace,
      Identify verb returned a valid OAI 2.0 response). Timetabling and programs
      data are community-scraped rather than offered as documented public APIs, so
      they were intentionally not cataloged. An official GitHub org exists
      (AustralianNationalUniversity, 1 public repo). No endpoints fabricated; every
      URL below was probed live.
    endpoints:
      - url: https://qrng.anu.edu.au/API/jsonI.php?length=3&type=uint8
        status: 200
        note: QRNG legacy JSON endpoint, returns quantum random array, no auth.
      - url: https://quantumnumbers.anu.edu.au/
        status: 200
        note: Newer AWS-hosted QRNG service, free API key registration.
      - url: https://qrng.anu.edu.au/contact/api-documentation/
        status: 200
        note: QRNG API documentation page.
      - url: https://openresearch-repository.anu.edu.au/server/oai/request?verb=Identify
        status: 200
        note: Open Research OAI-PMH 2.0 endpoint, valid Identify response (DSpace).
      - url: https://openresearch-repository.anu.edu.au/oai/request?verb=Identify
        status: 404
        note: Older OAI path no longer valid; correct path is /server/oai/request.
      - url: https://www.anu.edu.au/
        status: 200
        note: Official university website.
      - url: https://programsandcourses.anu.edu.au/
        status: 200
        note: Programs and courses catalog (web UI, no documented public API).
      - url: https://github.com/AustralianNationalUniversity
        status: 200
        note: Official ANU GitHub organization, 1 public repo.
