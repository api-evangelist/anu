apis:
  - aid: anu:qrng
    name: QRNG@ANU Quantum Random Numbers API
    description: >-
      Public API serving live quantum random numbers generated by ANU's quantum
      optics research group. The legacy JSON endpoint returns arrays of uint8,
      uint16, or hex16 values (array length 1-1024) and requires no signup. A
      newer AWS-hosted service at quantumnumbers.anu.edu.au offers the same data
      with a free registered API key.
    humanURL: https://qrng.anu.edu.au/contact/api-documentation/
