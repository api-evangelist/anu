---
aid: anu
name: Australian National University
description: >-
  The Australian National University (ANU) is a public research university in
  Canberra, ranked #28 in the QS World University Rankings 2025 and consistently
  among Australia's leading institutions. ANU's public developer/API footprint is
  modest and research-driven rather than centered on a single institutional
  developer portal. The most prominent public API is QRNG@ANU (ANU Quantum
  Numbers), which serves live quantum random numbers over HTTP. ANU also exposes
  its Open Research institutional repository metadata via a standard OAI-PMH
  endpoint. Most administrative systems (timetabling, programs and courses,
  student services) are gated or community-scraped rather than offered as
  documented public APIs.
